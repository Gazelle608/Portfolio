<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6d365"/>
      <stop offset="50%" stop-color="#e7c342"/>
      <stop offset="100%" stop-color="#c79f1c"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="100" height="100" rx="20" fill="#07120f"/>
  <rect x="8" y="8" width="84" height="84" rx="18" fill="url(#goldGradient)" opacity="0.12"/>
  <text x="50" y="62" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-weight="800" font-size="52" fill="url(#goldGradient)" filter="url(#glow)">GP</text>
</svg>
